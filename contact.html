<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Портфолио</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для элементов формы в рамках единого дизайна */
        form { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 30px;
        }
        input, textarea { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            background: var(--bg-color); 
            color: var(--text-color);
            font-family: inherit;
        }
        form button { 
            padding: 12px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }
        form button:hover {
            opacity: 0.9;
        }
        .social-links a {
            color: var(--accent-color);
            text-decoration: none;
            margin-right: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><strong>Портфолио</strong></div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="about.html">О себе</a>
            <a href="projects.html">Проекты</a>
            <a href="contact.html" class="active">Контакты</a>
        </nav>
        <button id="theme-toggle">Тема</button>
    </header>

    <main>
        <section>
            <h1>Контакты</h1>
            <form id="contact-form">
                <input type="text" placeholder="Ваше имя" required>
                <input type="email" placeholder="Ваш Email" required>
                <textarea placeholder="Ваше сообщение" rows="5"></textarea>
                <button type="submit">Отправить</button>
            </form>

            <div class="contact-info">
                <h3>Связаться напрямую</h3>
                <p><strong>Email:</strong> <a href="mailto:rasulimantaev367@gmail.com" style="color: var(--accent-color);">rasulimantaev367@gmail.com</a></p>
                
                <div class="social-links">
                    <a href="https://github.com/LunWoo111" target="_blank">GitHub</a>
                    <a href="#">Telegram</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>2026 &copy; Rasul | Разработчик</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
